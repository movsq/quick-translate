# translator configuration — sourced as shell by translate-notify.sh and
# translate-view.sh. Lines are KEY="value"; # starts a comment.
# Language codes are whatever `trans -list-codes` knows (cs, en, de, ja, …).

# Language to translate INTO.
TARGET_LANG="cs"

# Auto-detect the source language ("on", the default) or force a preset one
# ("off"). With "off", SOURCE_LANG below must be set; if it isn't, the
# scripts warn once and fall back to auto-detection.
AUTO_DETECT="on"

# Source language used only when AUTO_DETECT="off".
SOURCE_LANG="en"

# ── Swappable tools (defaults kept below; uncomment to change) ───────────
# The only two non-hard dependencies. `trans` (translate-shell) and the
# Wayland clipboard are required and are not configurable here.

# Notification command — must accept notify-send's flags (-a -u -t -A).
# mako (default) and dunst both ship a compatible notify-send.
#NOTIFY="notify-send"

# Terminal for the popup/input windows. A function, so it can absorb each
# terminal's flag differences. The window MUST get the app_id/class
# "trans-popup" (matched by the Sway float rule) and run the command in "$@".
#   kitty (default):
#open_terminal() { exec kitty --class trans-popup --title "Translator" "$@"; }
#   foot:
#open_terminal() { exec foot --app-id=trans-popup --title="Translator" "$@"; }
#   alacritty (note the -e before the command):
#open_terminal() { exec alacritty --class trans-popup --title "Translator" -e "$@"; }
