# translator configuration — sourced as shell by translate-notify.sh and
# translate-view.sh. Lines are KEY="value"; # starts a comment.
# Language codes are whatever `trans -list-codes` knows (cs, en, de, ja, …).

# Language to translate INTO.
TARGET_LANG="cs"

# Auto-detect the source language ("on", the default) or force a preset one
# ("off"). With "off", SOURCE_LANG below must be set; if it isn't, the
# scripts warn once and fall back to auto-detection.
AUTO_DETECT="on"

# Source language used only when AUTO_DETECT="off".
SOURCE_LANG=""
